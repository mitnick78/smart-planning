name: Build & Release Smart Planning Pro

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS Apple Silicon
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS Intel
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.label }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ✅ workdir remplacé par workspaces
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      # ✅ --break-system-packages ajouté
      - name: Fix icons to RGBA
        run: |
          pip3 install Pillow --break-system-packages
          python3 -c "
          from PIL import Image
          import os
          icons_dir = 'src-tauri/icons'
          for f in os.listdir(icons_dir):
              if f.endswith('.png'):
                  path = os.path.join(icons_dir, f)
                  img = Image.open(path).convert('RGBA')
                  img.save(path)
                  print('OK:', f)
          "

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Smart Planning Pro ${{ github.ref_name }}"
          releaseBody: |
            ## Smart Planning Pro ${{ github.ref_name }}

            ### Téléchargements
            - **macOS Apple Silicon** (M1/M2/M3) → fichier `_aarch64.dmg`
            - **macOS Intel** → fichier `_x64.dmg`
            - **Windows** → fichier `.msi`
            - **Linux** → fichier `.AppImage` ou `.deb`

            ### Installation macOS
            Si macOS bloque l'ouverture :
            ```
            Clic droit sur l'app → Ouvrir → Ouvrir quand même
            ```
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
